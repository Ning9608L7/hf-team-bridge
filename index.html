<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  #hfb-auth-shell{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; background:linear-gradient(135deg,#e8f7f4 0%,#f7fbff 52%,#f9edf5 100%);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
    color:#183d38;
  }
  .hfb-auth-card{
    width:min(440px,100%); background:#fff; border:1px solid #c7e3de;
    border-radius:20px; padding:34px 32px; box-shadow:0 18px 48px rgba(31,122,112,.14);
  }
  .hfb-auth-logo{width:64px;height:64px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1f7a70,#5fb8d6);color:#fff;font-size:36px}
  .hfb-auth-title{text-align:center;font-size:27px;font-weight:700;margin:0 0 6px}
  .hfb-auth-subtitle{text-align:center;color:#668a84;font-size:16px;margin:0 0 26px}
  .hfb-auth-field{margin-bottom:16px}
  .hfb-auth-field label{display:block;font-size:16px;font-weight:600;margin-bottom:6px}
  .hfb-auth-field input{width:100%;box-sizing:border-box;border:1px solid #bddbd6;border-radius:10px;padding:12px 14px;font-size:17px;outline:none}
  .hfb-auth-field input:focus{border-color:#2f9e94;box-shadow:0 0 0 3px rgba(47,158,148,.14)}
  .hfb-auth-email-wrap{display:flex;align-items:stretch;border:1px solid #bddbd6;border-radius:10px;overflow:hidden;background:#fff}
  .hfb-auth-email-wrap:focus-within{border-color:#2f9e94;box-shadow:0 0 0 3px rgba(47,158,148,.14)}
  .hfb-auth-email-wrap input{flex:1;min-width:0;border:0;border-radius:0;box-shadow:none!important}
  .hfb-auth-email-domain{display:flex;align-items:center;padding:0 13px;background:#fff;color:#456f68;font-size:16px;white-space:nowrap}
  .hfb-auth-button{width:100%;border:0;border-radius:10px;padding:12px 16px;background:#2f9e94;color:#fff;font-size:18px;font-weight:700;cursor:pointer}
  .hfb-auth-button:hover{background:#1f7a70}
  .hfb-auth-button:disabled{opacity:.65;cursor:wait}
  .hfb-auth-message{min-height:22px;margin-top:12px;text-align:center;font-size:15px;color:#bb3d4a}
  .hfb-auth-notice{margin-top:18px;padding-top:16px;border-top:1px solid #e1efec;text-align:center;color:#708f89;font-size:13px;line-height:1.6}
  .hfb-auth-user{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:17px}
  .hfb-auth-logout{font-family:inherit;font-size:16px;padding:6px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12);color:#fff;cursor:pointer}
  .hfb-auth-logout:hover{background:rgba(255,255,255,.24)}
</style>
<div id="hfb-auth-shell">
  <form class="hfb-auth-card" id="hfb-login-form" autocomplete="off">
    <div class="hfb-auth-logo">♥</div>
    <h1 class="hfb-auth-title">心臟衰竭照護平台</h1>
    <div class="hfb-auth-field">
      <label for="hfb-login-email">電子郵件</label>
      <div class="hfb-auth-email-wrap">
        <input id="hfb-login-email" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" aria-label="院內電子郵件帳號" required>
        <span class="hfb-auth-email-domain">@chimei.org.tw</span>
      </div>
    </div>
    <div class="hfb-auth-field">
      <label for="hfb-login-password">密碼</label>
      <input id="hfb-login-password" type="password" autocomplete="new-password" required>
    </div>
    <button class="hfb-auth-button" id="hfb-login-submit" type="submit">登入系統</button>
    <div class="hfb-auth-message" id="hfb-login-message" role="alert"></div>
    <div class="hfb-auth-notice">本系統僅供授權之醫療團隊成員使用。<br>如需協助，請聯絡管理員：26-1837</div>
  </form>
</div>
<!-- 心衰竭多專科團隊協作平台 -->
<style>
  #hfb-root{
    --bg:#F3FAF9; --surface:#FFFFFF; --line:#C7E3DE;
    --ink:#152D2A; --ink-soft:#4A6E69; --ink-mute:#6B8F88;
    --primary:#2F9E94; --primary-deep:#1F7A70; --primary-tint:#DFF5F1;
    --secondary:#5FB8D6; --secondary-deep:#3D96B5; --secondary-tint:#E3F5FA;
    --pt:#5C6BAA; --pt-tint:#E7E9F5;
    --rd:#7A8B3F; --rd-tint:#EFF3E1;
    --ph:#B5653D; --ph-tint:#F7EAE1;
    --np:#C25666; --np-tint:#F8E4E7;
    --status-pending-ink:#FFFFFF; --status-pending-bg:#E63946;
    --status-progress-ink:#B5772A; --status-progress-bg:#FBEEDD;
    --status-done-ink:#1F7A70; --status-done-bg:#DFF5F1;
    background:var(--bg); color:var(--ink);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:24px;
    border-radius:14px; overflow:hidden; border:1px solid var(--line);
    display:flex; flex-direction:column; min-height:640px;
  }
  #hfb-root *{box-sizing:border-box;}
  #hfb-root button{font-family:inherit; cursor:pointer;}
  #hfb-root input, #hfb-root textarea, #hfb-root select{font-family:inherit;}

  .hfb-topbar{position:relative; overflow:hidden; background:linear-gradient(120deg, var(--primary-deep), var(--primary) 55%, #5FB8D6 100%); color:#fff; padding:14px 20px; display:grid; grid-template-columns:minmax(300px,auto) minmax(340px,1fr) auto; align-items:center; gap:16px;}
  @keyframes hfb-heartbeat{ 0%,100%{transform:scale(1);} 12%{transform:scale(1.16);} 24%{transform:scale(1);} 36%{transform:scale(1.1);} 48%{transform:scale(1);} }
  .hfb-brand-mark{width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; animation:hfb-heartbeat 1.6s ease-in-out infinite;}
  .hfb-topbar > *{position:relative; z-index:1;}
  .hfb-brand{display:flex; align-items:center; gap:10px;}
  .hfb-brand-text h1{font-size:24px; font-weight:500; margin:0;}
  .hfb-brand-text p{font-size:20px; margin:1px 0 0; color:rgba(255,255,255,0.65);}
  .hfb-brand-text p.hfb-clock{font-size:18.5px; font-weight:500; letter-spacing:0.5px; color:rgba(255,255,255,0.7); margin:1px 0 0;}
  .hfb-daily-msg{color:#fff; font-size:22.5px; font-weight:600; letter-spacing:0.3px; text-align:center; padding:7px 16px; animation:hfb-blink 1.8s ease-in-out infinite; justify-self:center; white-space:nowrap;}
  .hfb-identity{display:flex; align-items:center; justify-self:end; gap:8px; font-size:21px; color:rgba(255,255,255,0.75); white-space:nowrap;}
  .hfb-admin-badge{font-size:14.5px; font-weight:600; line-height:1; padding:5px 8px; border-radius:6px; background:rgba(255,255,255,.18); color:#fff;}
  .hfb-export-icon{width:38px; height:38px; padding:6px; border-radius:8px; border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.1); color:#fff; display:inline-flex; align-items:center; justify-content:center;}
  .hfb-export-icon:hover{background:rgba(255,255,255,.2);}
  .hfb-export-icon svg{width:23px; height:23px; display:block;}
  @media (max-width:1180px){
    .hfb-topbar{grid-template-columns:auto auto;}
    .hfb-daily-msg{grid-column:1 / -1; grid-row:2; justify-self:center; padding-top:2px;}
    .hfb-identity{grid-column:2; grid-row:1;}
  }
  @media (max-width:760px){
    .hfb-topbar{grid-template-columns:1fr;}
    .hfb-brand,.hfb-daily-msg,.hfb-identity{grid-column:1; justify-self:start;}
    .hfb-brand{grid-row:1;}
    .hfb-daily-msg{grid-row:2; white-space:normal; text-align:left; padding:4px 0;}
    .hfb-identity{grid-row:3; flex-wrap:wrap; white-space:normal;}
  }
  .hfb-identity select{background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:6px 10px; font-size:21.5px;}
  .hfb-manage-btn{font-size:19.5px; padding:6px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.35); background:rgba(255,255,255,0.1); color:#fff;}
  .hfb-manage-btn:hover{background:rgba(255,255,255,0.2);}
  .hfb-member-panel{background:var(--surface); border-bottom:1px solid var(--line); padding:14px 20px;}
  .hfb-member-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--line);}
  .hfb-member-name{font-size:22px; font-weight:500; flex:1;}
  .hfb-member-add{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .hfb-member-add input{border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:21.5px; flex:1; min-width:160px;}
  .hfb-member-add select{border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:21.5px;}
  .hfb-identity select option{color:#111;}

  .hfb-tabs{display:flex; gap:4px; padding:10px 20px 0; background:var(--surface); border-bottom:1px solid var(--line);}
  .hfb-tab{padding:9px 14px; font-size:22px; color:var(--ink-soft); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px;}
  .hfb-tab.active{color:var(--primary-deep); border-bottom-color:var(--primary); font-weight:500;}
  .hfb-tab .hfb-count{display:inline-block; margin-left:5px; font-size:19.5px; background:var(--np-tint); color:var(--status-progress-ink); border-radius:10px; padding:1px 6px;}

  .hfb-body{display:flex; flex:1; min-height:0;}
  .hfb-main{flex:1; overflow-y:auto; padding:22px 26px; min-width:0;}

  .hfb-new-case-btn{font-size:21px; padding:8px 14px; border-radius:8px; border:1px solid var(--secondary); color:#fff; background:var(--secondary); font-weight:500;}
  .hfb-new-case-btn:hover{background:var(--secondary-deep);}
  .hfb-empty-side{padding:24px 16px; font-size:21.5px; color:var(--ink-mute); text-align:center;}

  .hfb-overview-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .hfb-overview-head h2{font-size:29px; font-weight:500; margin:0; color:var(--ink);}
  .hfb-overview-actions{display:flex; align-items:center; justify-content:flex-end; gap:10px; flex-wrap:wrap;}
  .hfb-table-wrap{background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .hfb-table{width:100%; border-collapse:collapse;}
  .hfb-table thead th{text-align:left; font-size:19.5px; color:var(--ink-mute); font-weight:500; padding:10px 14px; border-bottom:1px solid var(--line); background:var(--bg);}
  .hfb-table tbody tr{cursor:pointer; border-bottom:1px solid var(--line);}
  .hfb-table tbody tr:last-child{border-bottom:none;}
  .hfb-table tbody tr:hover{background:var(--primary-tint);}
  .hfb-table td{padding:12px 14px; font-size:21.5px; vertical-align:middle;}
  .hfb-table .pname{font-weight:500; font-size:22.5px;}
  .hfb-table .pmeta{font-size:19px; color:var(--ink-mute); margin-top:2px;}
  .hfb-case-number-input{width:112px; max-width:100%; border:1.5px solid #8fcfc5; border-radius:9px; padding:9px 10px; font-size:20px; font-weight:600; color:var(--primary-deep); background:var(--primary-tint); text-align:center;}
  .hfb-case-number-input::placeholder{color:#6b9f97; font-weight:500;}
  .hfb-case-number-input:focus{outline:none; background:#fff; border-color:var(--primary); box-shadow:0 0 0 3px rgba(47,158,148,.16);}
  .hfb-role-dots{display:flex; gap:6px;}
  .hfb-role-dot{width:16px; height:16px; border-radius:50%; background:var(--dot-color); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:10px; line-height:1;}
  .hfb-role-dot.done{opacity:1;}
  .hfb-role-dot.pending{opacity:0.45;}
  .hfb-role-dot.in_progress{opacity:0.75;}
  .hfb-role-dot.none{opacity:0.22;}
  .hfb-mini-progress{width:90px; height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
  .hfb-mini-progress-fill{height:100%; background:linear-gradient(90deg, var(--primary), var(--secondary));}
  .hfb-td-nowrap{white-space:nowrap;}
  .hfb-fu-done{display:inline-flex; align-items:center; gap:6px; font-size:17px; color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
  .hfb-note-done{text-decoration:line-through; color:var(--ink-mute);}
  .hfb-fu-done input{width:19px; height:19px; accent-color:var(--primary); cursor:pointer;}
  .hfb-discharge-btn{font-size:17px; font-weight:700; padding:6px 12px; border-radius:20px; border:1.5px solid var(--line); background:var(--bg); color:var(--ink-mute); cursor:pointer; transition:background .15s,color .15s,border-color .15s;}
  .hfb-discharge-btn.on{background:var(--primary); color:#fff; border-color:var(--primary);}
  .hfb-discharge-tag{font-size:16.5px; font-weight:700; color:var(--primary-deep); background:var(--primary-tint); padding:4px 10px; border-radius:20px;}
  .hfb-locked-tag{font-size:16.5px; font-weight:700; color:var(--status-pending-ink); background:var(--status-pending-bg); padding:4px 12px; border-radius:20px;}
  .hfb-delete-btn{font-size:28px; width:auto; height:auto; padding:4px; border-radius:8px; border:none; background:transparent; cursor:pointer; line-height:1; display:inline-flex; align-items:center; justify-content:center; transition:transform .12s;}
  .hfb-delete-btn:hover{transform:scale(1.15) rotate(-6deg);}

  .hfb-back-btn{font-size:20.5px; padding:6px 12px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); margin-bottom:14px; display:inline-flex; align-items:center; gap:4px;}
  .hfb-back-btn:hover{background:var(--bg); color:var(--ink);}

  .hfb-role-groups{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:6px;}
  @media (max-width:640px){
    .hfb-role-groups{grid-template-columns:1fr;}
    .hfb-table{font-size:18.5px;}
  }
  .hfb-role-group{background:var(--surface); border:1px solid var(--line); border-top:4px solid var(--role-color); border-radius:12px; padding:14px 16px;}
  .hfb-role-group-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .hfb-role-group-head .rname{font-size:23px; font-weight:700; color:var(--role-color);}
  .hfb-role-group-summary{font-size:19px; color:var(--ink-mute); margin-bottom:10px;}
  .hfb-role-group-empty{font-size:19.5px; color:var(--ink-mute); padding:14px 0; text-align:center;}

  .hfb-case-header{border-bottom:1px solid var(--line); padding-bottom:14px; margin-bottom:18px;}
  .hfb-case-header h2{font-size:29px; font-weight:500; margin:0 0 4px;}
  .hfb-case-header .sub{font-size:21.5px; color:var(--ink-soft);}
  .hfb-case-header .note{font-size:21.5px; color:var(--ink-soft); margin-top:10px; background:var(--bg); padding:8px 10px; border-radius:8px; line-height:1.6;}
  .hfb-info-cols{display:grid; grid-template-columns:1.1fr 1.1fr 1fr; gap:8px 26px; margin-top:12px;}
  .hfb-info-col{display:flex; flex-direction:column; gap:8px;}
  .hfb-info-item{font-size:21.5px; display:flex; gap:8px; align-items:baseline;}
  .hfb-info-label{color:var(--ink-mute); flex-shrink:0; min-width:88px;}
  .hfb-info-value{color:var(--ink); font-weight:600;}
  .hfb-info-note{flex-direction:column; align-items:flex-start; gap:3px;}
  .hfb-info-note .hfb-info-value{font-weight:500; background:var(--bg); padding:8px 10px; border-radius:8px; width:100%;}
  @media (max-width:700px){ .hfb-info-cols{grid-template-columns:1fr;} }
  .hfb-locked-note{font-size:18.5px; color:var(--ink-mute); margin-top:9px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .hfb-edit-btn{font-size:16.5px; padding:4px 11px; border-radius:7px; border:1px solid var(--primary); color:var(--primary-deep); background:var(--primary-tint); font-weight:600;}
  .hfb-edit-btn:hover{background:var(--primary); color:#fff;}
  .hfb-edit-note{font-size:16.5px; color:var(--secondary-deep); background:var(--secondary-tint); padding:6px 10px; border-radius:8px; margin-bottom:10px;}

  .hfb-section-title{font-size:21.5px; font-weight:500; color:var(--ink-soft); margin:20px 0 10px; display:flex; align-items:center; justify-content:space-between;}
  .hfb-assign-btn{font-size:21px; padding:6px 12px; border-radius:8px; border:1px solid var(--secondary); color:#fff; background:var(--secondary); font-weight:500;}
  .hfb-assign-btn:hover{background:var(--secondary-deep);}

  .hfb-task-card{background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--role-color, var(--primary)); border-radius:10px; padding:12px 14px; margin-bottom:10px;}
  .hfb-task-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .hfb-role-badge{font-size:20px; font-weight:700; padding:2px 8px; border-radius:6px; display:inline-block;}
  .hfb-task-title{font-size:23px; font-weight:500; margin:6px 0 2px; color:var(--ink-soft);}
  .hfb-task-meta{font-size:20px; color:var(--ink-mute);}
  .hfb-task-date-editor{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap;}
  .hfb-task-date-editor input{font-size:17px; padding:4px 7px; border:1px solid var(--line); border-radius:7px; color:var(--ink); background:var(--surface);}
  .hfb-task-date-save{font-size:16px; padding:5px 10px; border:1px solid var(--primary); border-radius:7px; color:#fff; background:var(--primary); font-weight:600;}
  .hfb-task-date-save:hover{background:var(--primary-deep);}
  .hfb-task-date-saved{font-size:15px; color:var(--primary-deep);}
  .hfb-task-top-actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end;}
  .hfb-task-delete{font-size:16px; padding:5px 9px; border:1px solid #D85B65; border-radius:7px; color:#B63E49; background:#FFF1F2; font-weight:600;}
  .hfb-task-delete:hover{color:#fff; background:#D85B65;}
  .hfb-status-pill{font-size:20px; padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0;}
  .hfb-status-pill.is-pending{font-size:22.5px; font-weight:700; animation:hfb-blink 1.1s ease-in-out infinite;}
  @keyframes hfb-blink{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .hfb-task-response{margin-top:9px; padding-top:9px; border-top:1px dashed var(--line); font-size:21.5px; color:var(--primary-deep); font-weight:700;}
  .hfb-task-response .who{color:var(--ink-mute); font-size:20px; margin-top:4px;}
  .hfb-task-actions{margin-top:9px; padding-top:9px; border-top:1px dashed var(--line);}
  .hfb-task-actions textarea{width:100%; min-height:56px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:21.5px; resize:vertical;}
  .hfb-task-actions .row{display:flex; gap:8px; margin-top:8px; align-items:center;}
  .hfb-btn-sm{font-size:21px; padding:6px 12px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--ink);}
  .hfb-btn-sm:hover{background:var(--bg);}
  .hfb-btn-primary-sm{font-size:21px; padding:6px 12px; border-radius:8px; border:1px solid var(--primary); background:var(--primary); color:#fff;}
  .hfb-btn-primary-sm:hover{background:var(--primary-deep);}

  .hfb-mytasks-item{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px;}
  .hfb-discharged-note{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:flex; align-items:center; justify-content:flex-start; gap:14px; flex-wrap:wrap; font-size:18px; color:var(--status-progress-ink); font-weight:600;}
  .hfb-dismiss-btn{font-size:16.5px; font-weight:700; padding:6px 16px; border-radius:8px; border:none; background:var(--secondary); color:#fff;}
  .hfb-dismiss-btn:hover{background:var(--secondary-deep);}
  .hfb-mytasks-item .patient{font-size:21px; color:var(--ink-mute); margin-bottom:4px;}

  .hfb-placeholder{display:flex; align-items:center; justify-content:center; height:100%; color:var(--ink-mute); font-size:22px; flex-direction:column; gap:6px; padding:60px 20px; text-align:center;}

  .hfb-modal-mask{position:relative; background:rgba(15,25,22,0.35); border-radius:12px; padding:18px; margin:6px 0 18px;}
  .hfb-modal{background:var(--surface); border-radius:12px; border:1px solid var(--line); padding:16px 18px;}
  .hfb-modal h3{font-size:24px; font-weight:500; margin:0 0 12px;}
  .hfb-hftype-group{display:flex; gap:8px; flex-wrap:wrap;}

  function normalizeDateKey(value){
    if(!value) return '';
    var m = String(value).trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
    if(!m) return '';
    return m[1]+'-'+String(Number(m[2])).padStart(2,'0')+'-'+String(Number(m[3])).padStart(2,'0');
  }
  function hospitalStayDays(c){

    var start = new Date(startKey+'T00:00:00');
    var end = new Date(endKey+'T00:00:00');
    if(isNaN(start.getTime()) || isNaN(end.getTime()) || end < start) return '—';

    var t = new Date();
    var age = t.getFullYear() - b.getFullYear();
    var m = t.getMonth() - b.getMonth();
    if(m<0 || (m===0 && t.getDate()<b.getDate())) age--;

  }
  function parseRocBirthday(value){
    value = String(value||'').trim().replace(/[年月.\-]/g,'/').replace(/日/g,'');

    if(!m) return '';
    var y = Number(m[1]), month = Number(m[2]), day = Number(m[3]);
    if(y < 1911) y += 1911;
    var d = new Date(y, month-1, day);
    if(d.getFullYear()!==y || d.getMonth()!==month-1 || d.getDate()!==day) return '';

    c.trackingRecords.push(entry);

  window.deleteTrackingRecord = function(caseId, recordKey){

    if(!c || !c.trackingRecords) return false;
    var idx = c.trackingRecords.findIndex(function(rec){
      return String(rec.recordId || rec.recordedAt || '')===String(recordKey);

  function dailyMessage(){

    var start = new Date(d.getFullYear(), 0, 0);
    var diff = d - start;
    var dayOfYear = Math.floor(diff / 86400000);
    return DAILY_MESSAGES[dayOfYear % DAILY_MESSAGES.length];
  }

  function fmt(d){
    var dt = new Date(d);
    return (dt.getMonth()+1)+'/'+dt.getDate()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
  }
  function formatDateWithWeekday(dateStr){
    if(!dateStr) return '';
    var p = String(dateStr).split('-');
    if(p.length!==3) return String(dateStr);
    var d = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
    if(isNaN(d.getTime())) return String(dateStr);
    return dateStr+'（'+['日','一','二','三','四','五','六'][d.getDay()]+'）';
  }

  function caseToCloudRow(c){
    var data = JSON.parse(JSON.stringify(c || {}));
    delete data.trackingRecords;
    return {
      id: c.id,
      patient_name: c.name || '',
      medical_record_number: c.mrn || '',
      case_date: cleanDate(c.caseDate),
      hf_type: c.hfType || '',
      patient_data: {
        birthday: c.birthday || '',

    };
  }

  function taskToCloudRow(t){
    return {
      id: t.id,
      case_id: t.caseId,
      target_role: t.role,
      title: t.title || '',
      scheduled_at: t.scheduledAt || null,
      status: t.cancelled ? 'cancelled' : (t.status || 'pending'),
      response: t.response || '',
      responded_by: t.respondedByMemberId || null,
      responded_at: t.respondedAt || null,
      task_data: JSON.parse(JSON.stringify(t || {})),
      updated_at: new Date().toISOString(),
      deleted_at: null
    };
  }

  function trackingToCloudRows(){
    var rows = [];
    state.cases.forEach(function(c){
      (c.trackingRecords || []).forEach(function(rec){
        if(!rec.recordId) rec.recordId = uid();
        rows.push({
          id: rec.recordId,
          case_id: c.id,
          record_data: JSON.parse(JSON.stringify(rec)),
          updated_by: state.authUserId,
          deleted_at: null
        });
      });
    });
    return rows;
  }

  function cloudCaseFromRow(row){
    var c = Object.assign({}, row.clinical_data || {});
    c.id = row.id;
    c.name = c.name || row.patient_name || '';
    c.mrn = c.mrn || row.medical_record_number || '';
    c.caseDate = c.caseDate || row.case_date || '';
    c.hfType = c.hfType || row.hf_type || '';
    c.followUp = Object.assign({}, c.followUp || {}, row.follow_up_data || {});
    c.discharged = !!row.is_discharged;
    c.trackingRecords = [];
    return c;
  }

  function cloudTaskFromRow(row){
    var t = Object.assign({}, row.task_data || {});
    t.id = row.id;
    t.caseId = row.case_id;
    t.role = t.role || row.target_role;
    t.title = t.title || row.title || '';
    t.scheduledAt = t.scheduledAt || row.scheduled_at || '';
    t.status = row.status || t.status || 'pending';
    t.cancelled = row.status === 'cancelled';
    t.response = row.response || t.response || '';
    t.assignedByMemberId = t.assignedByMemberId || row.assigned_by || null;
    t.respondedByMemberId = t.respondedByMemberId || row.responded_by || null;
    t.respondedAt = row.responded_at || t.respondedAt || null;
    return t;
  }

  function reportCloudError(prefix, error){
    console.error(prefix, error);
    if(state.syncErrorShown) return;
    state.syncErrorShown = true;
    window.alert(prefix + '。資料尚未成功同步，請先不要重複輸入，並將畫面截圖提供給管理員。');
  }

  async function runTaskRpc(functionName, parameters){
    var client = cloudClient();
    if(!client){
      reportCloudError('找不到 Supabase 連線', {});
      return false;
    }
    var result = await client.rpc(functionName, parameters);
    if(result.error){
      reportCloudError('任務操作失敗', result.error);
      return false;
    }
    await loadCloudData();
    return true;
  }

  async function loadCloudData(){
    var client = cloudClient();
    if(!client){
      reportCloudError('找不到 Supabase 連線', {});
      return;
    }
    state.cloudReady = false;
    state.loaded = false;
    render();

    var results = await Promise.all([
      client.from('cases').select('*').is('deleted_at', null).order('case_date', {ascending:false}),
      client.from('tasks').select('*').is('deleted_at', null).order('created_at', {ascending:true}),
      client.from('tracking_records').select('*').is('deleted_at', null).order('created_at', {ascending:false}),
      client.from('profiles').select('id, display_name, professional_role').eq('is_active', true)
    ]);
    var caseResult = results[0], taskResult = results[1], trackingResult = results[2], profileResult = results[3];
    var firstError = caseResult.error || taskResult.error || trackingResult.error || profileResult.error;
    if(firstError){
      state.loaded = true;
      render();
      reportCloudError('無法讀取 Supabase 資料', firstError);
      return;
    }

    state.cases = (caseResult.data || []).map(cloudCaseFromRow);
    state.tasks = (taskResult.data || []).map(cloudTaskFromRow);
    var profileMap = {};
    (profileResult.data || []).forEach(function(profile){ profileMap[profile.id] = profile; });
    state.tasks.forEach(function(t){
      var assigner = profileMap[t.assignedByMemberId];
      if(assigner){
        t.assignedByName = assigner.display_name || t.assignedByName || '';
        t.assignedByRole = roleKeyFromProfessional(assigner.professional_role);
      }
      var responder = profileMap[t.respondedByMemberId];
      if(responder){
        t.respondedByName = responder.display_name || t.respondedByName || '';
        t.respondedBy = roleKeyFromProfessional(responder.professional_role);
      }
    });
    var caseMap = {};
    state.cases.forEach(function(c){ caseMap[c.id] = c; });
    (trackingResult.data || []).forEach(function(row){
      var c = caseMap[row.case_id];
      if(!c) return;
      var rec = Object.assign({}, row.record_data || {});
      rec.recordId = row.id;
      c.trackingRecords.push(rec);
    });
    state.cases.forEach(function(c){
      c.trackingRecords.sort(function(a,b){ return (b.recordedAt||'').localeCompare(a.recordedAt||''); });
    });

    state.cloudCaseIds = state.cases.map(function(c){ return c.id; });
    state.cloudTaskIds = state.tasks.map(function(t){ return t.id; });
    state.cloudTrackingIds = (trackingResult.data || []).map(function(r){ return r.id; });
    state.cloudReady = true;
    state.loaded = true;
    state.syncErrorShown = false;
    render();
  }

  function scheduleCloudSync(){
    if(!state.cloudReady) return;
    clearTimeout(state.syncTimer);
    state.syncTimer = setTimeout(syncCloudData, 350);
  }

  async function syncCloudData(){
    if(!state.cloudReady) return;
    if(state.syncing){
      state.syncQueued = true;
      return;
    }
    state.syncing = true;
    state.syncQueued = false;
    var client = cloudClient();
    try{
      var caseRows = state.cases.map(caseToCloudRow);
      var taskRows = state.tasks.map(taskToCloudRow);
      var trackingRows = trackingToCloudRows();

      if(caseRows.length){
        var caseUpsert = await client.from('cases').upsert(caseRows);
        if(caseUpsert.error) throw caseUpsert.error;
      }
      if(taskRows.length){
        var taskUpsert = await client.from('tasks').upsert(taskRows);
        if(taskUpsert.error) throw taskUpsert.error;
      }
      if(trackingRows.length){
        var trackingUpsert = await client.from('tracking_records').upsert(trackingRows);
        if(trackingUpsert.error) throw trackingUpsert.error;
      }

      var currentCaseIds = caseRows.map(function(r){ return r.id; });
      var currentTaskIds = taskRows.map(function(r){ return r.id; });
      var currentTrackingIds = trackingRows.map(function(r){ return r.id; });
      var removedCases = state.cloudCaseIds.filter(function(id){ return currentCaseIds.indexOf(id)<0; });
      var removedTasks = state.cloudTaskIds.filter(function(id){ return currentTaskIds.indexOf(id)<0; });
      var removedTracking = state.cloudTrackingIds.filter(function(id){ return currentTrackingIds.indexOf(id)<0; });

      if(removedTracking.length){
        var delTracking = await client.from('tracking_records').delete().in('id', removedTracking);
        if(delTracking.error) throw delTracking.error;
      }
      if(removedTasks.length){
        var delTasks = await client.from('tasks').delete().in('id', removedTasks);
        if(delTasks.error) throw delTasks.error;
      }
      if(removedCases.length){
        var delCases = await client.from('cases').delete().in('id', removedCases);
        if(delCases.error) throw delCases.error;
      }

      state.cloudCaseIds = currentCaseIds;
      state.cloudTaskIds = currentTaskIds;
      state.cloudTrackingIds = currentTrackingIds;
      state.syncErrorShown = false;
    }catch(error){
      reportCloudError('Supabase 儲存失敗', error);
    }finally{
      state.syncing = false;
      if(state.syncQueued) scheduleCloudSync();
    }
  }

    if(ts.length===0) return {done:0,total:0};
    var done = ts.filter(function(t){ return t.status==='done'; }).length;
    return {done:done, total:ts.length};

  function overviewPage(){
    var newBtn = isInitiator(state.identity) ? '<button class="hfb-new-case-btn" id="hfb-open-newcase">+ 新增個案</button>' : '';
    var hfTypesForFilter = ['全部','HFpEF','HFmrEF','HFrEF'];
    var filterBtns = '';
    hfTypesForFilter.forEach(function(ht){
      var isAll = ht==='全部';
      var active = (isAll ? !state.overviewHfFilter : state.overviewHfFilter===ht) ? ' active' : '';
      filterBtns += '<button type="button" class="hfb-hftype-btn'+(isAll?'':hfTypeClass(ht))+active+'" data-overview-filter="'+(isAll?'':ht)+'">'+ht+'</button>';
    });
    var head = '<div class="hfb-overview-head"><h2>個案總覽</h2><div class="hfb-overview-actions"><div class="hfb-hftype-group">'+filterBtns+'</div>'+newBtn+'</div></div>';
    var overviewCases = state.cases.filter(function(c){
      return !state.overviewHfFilter || c.hfType===state.overviewHfFilter;
    });

    if(state.cases.length===0){
      return head + '<div class="hfb-table-wrap"><div class="hfb-empty-side">尚無個案'+
        (isInitiator(state.identity) ? '・點擊「+ 新增個案」開始收案' : '') + '</div></div>';
    }
    if(overviewCases.length===0){
      return head + '<div class="hfb-table-wrap"><div class="hfb-empty-side">此分類目前沒有個案</div></div>';
    }

    var rows = '';
    overviewCases.slice().sort(function(a,b){
      var dateA = normalizeDateKey(a.caseDate);
      var dateB = normalizeDateKey(b.caseDate);
      if(dateA!==dateB) return dateB.localeCompare(dateA);
      return (Number(b.createdAt)||0)-(Number(a.createdAt)||0);
    }).forEach(function(c){
      var p = progressOf(c.id);
      var pct = p.total ? Math.round(p.done/p.total*100) : 0;
      var dots = '';
      TASKABLE_ROLES.forEach(function(r){
        var roleTasks = tasksForCase(c.id).filter(function(t){ return t.role===r; });
        var cls = 'none';
        var mark = '';
        if(roleTasks.length){
          cls = 'pending';
          if(roleTasks.every(function(t){ return t.status==='done'; })){ cls='done'; mark='✓'; }
          else if(roleTasks.some(function(t){ return t.status!=='pending'; })) cls='in_progress';
        }
        dots += '<span class="hfb-role-dot '+cls+'" style="--dot-color:'+ROLES[r].color+'" title="'+ROLES[r].label+(roleTasks.length?'':'・尚未指派')+'">'+mark+'</span>';
      });
      var canManage = isInitiator(state.identity);
      var dischargeBtn = canManage
        ? '<button type="button" class="hfb-discharge-btn'+(c.discharged?' on':'')+'" data-discharge="'+c.id+'">'+(c.discharged?'已出院':'出院')+'</button>'
        : (c.discharged ? '<span class="hfb-discharge-tag">已出院</span>' : '—');
      var deleteBtn = canManage
        ? '<button type="button" class="hfb-delete-btn" data-delete-case="'+c.id+'" title="刪除個案">🗑️</button>'
        : '';
      var caseNumberHtml = canManage
        ? '<input type="text" class="hfb-case-number-input" data-case-number="'+c.id+'" value="'+esc(c.caseNumber||'')+'" aria-label="'+esc(c.name)+'的編號" placeholder="編號">'
        : esc(c.caseNumber||'—');
      rows += '<tr data-case="'+c.id+'">'+
        '<td class="hfb-td-nowrap">'+caseNumberHtml+'</td>'+
        '<td><div class="pname">'+esc(c.name)+(c.hfType?'<span class="hfb-hftype-tag'+hfTypeClass(c.hfType)+'">'+esc(c.hfType)+'</span>':'')+'</div><div class="pmeta">'+esc(c.mrn||'未填病歷號')+
          (function(){ var a=calcAge(c.birthday); var g=genderFromId(c.idnumber); var extra=[]; if(a!==null) extra.push(a+'歲'); if(g) extra.push(g); return extra.length ? ' ・ '+extra.join(' '):''; })()+
        '</div></td>'+
        '<td>'+(c.initiatorName?esc(c.initiatorName):ROLES[c.initiator].label)+'</td>'+
        '<td class="pmeta hfb-td-nowrap">'+esc(c.admissionDate||'—')+'</td>'+
        '<td class="pmeta hfb-td-nowrap">'+esc(c.dischargeDate||'—')+'</td>'+
        '<td class="pmeta hfb-td-nowrap">'+hospitalStayDays(c)+'</td>'+
        '<td class="pmeta hfb-td-nowrap">'+esc(c.caseDate||fmt(c.createdAt))+'</td>'+
        '<td><div class="hfb-role-dots">'+dots+'</div></td>'+
        '<td><div class="hfb-mini-progress"><div class="hfb-mini-progress-fill" style="width:'+pct+'%"></div></div>'+
          '<div class="pmeta">'+p.done+'/'+p.total+' 已完成</div></td>'+
        '<td class="hfb-td-nowrap">'+dischargeBtn+'</td>'+
        '<td class="hfb-td-nowrap">'+deleteBtn+'</td>'+
      '</tr>';
    });

    return head + '<div class="hfb-table-wrap"><table class="hfb-table">'+
      '<thead><tr><th>編號</th><th>個案</th><th>收案人</th><th>住院日期</th><th>出院日期</th><th>住院天數</th><th>收案日期</th><th>各職類狀態</th><th>整體進度</th><th>出院</th><th></th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table></div>';
  }

  function followUpOverviewPage(){
    var hfTypesForFilter = ['全部','HFpEF','HFmrEF','HFrEF'];

        '<td class="pmeta">'+(fu.doctor?esc(fu.doctor)+(fu.session?' ('+esc(fu.session)+')':''):'—')+'</td>'+
        '<td class="pmeta">'+noteHtml+'</td>'+

    return head + '<div class="hfb-table-wrap"><table class="hfb-table">'+
      '<thead><tr><th>個案</th><th>出院日期</th><th>下次門診</th><th>追蹤醫師</th><th>追蹤備註</th><th>完成</th></tr></thead>'+

    var c = state.cases.find(function(x){ return x.id===state.activeCaseId; });

      return overviewPage();
    }
    var ts = tasksForCase(c.id);
    var age = calcAge(c.birthday);
    var gender = genderFromId(c.idnumber);
    var leftRows = [
      ['病歷號', esc(c.mrn||'—')],
      ['身分證字號', c.idnumber ? esc(c.idnumber)+(gender?' ('+gender+')':'') : '—'],
      ['生日', c.birthday ? esc(c.birthday)+(age!==null?' ('+age+'歲)':'') : '—']
    ];
    var midRows = [
      ['床號', esc(c.ward||'—')],
      ['住院日期', esc(c.admissionDate||'—')],
      ['收案日期', esc(c.caseDate||fmt(c.createdAt))],
      ['收案人', (c.initiatorName?esc(c.initiatorName)+'・':'')+ROLES[c.initiator].label]
    ];
    var colHtml = function(rows){
      var h = '';
      rows.forEach(function(row){
        h += '<div class="hfb-info-item"><span class="hfb-info-label">'+row[0]+'</span><span class="hfb-info-value">'+row[1]+'</span></div>';

      return h;
    };
    var medicalHistoryItems = (Array.isArray(c.medicalHistory) ? c.medicalHistory : []).filter(function(item){ return item!=='其他'; });
    if(c.medicalHistoryOther) medicalHistoryItems.push(c.medicalHistoryOther);
    var medicalHistoryText = medicalHistoryItems.length ? medicalHistoryItems.map(esc).join('、') : '—';
    var infoGridHtml = '<div class="hfb-info-cols">'+
      '<div class="hfb-info-col">'+colHtml(leftRows)+'</div>'+
      '<div class="hfb-info-col">'+colHtml(midRows)+'</div>'+
      '<div class="hfb-info-col"><div class="hfb-info-item hfb-info-note"><span class="hfb-info-label">過去病史</span><span class="hfb-info-value">'+medicalHistoryText+'</span></div>'+
        (c.note ? '<div class="hfb-info-item hfb-info-note"><span class="hfb-info-label">收案備註</span><span class="hfb-info-value">'+esc(c.note)+'</span></div>' : '')+'</div>'+
    '</div>';

    var body = '<button class="hfb-back-btn" id="hfb-back-overview">← 返回總覽</button>';

      '<h2>'+esc(c.name)+(c.hfType?'<span class="hfb-hftype-tag'+hfTypeClass(c.hfType)+'">'+esc(c.hfType)+'</span>':'')+'</h2>'+
      infoGridHtml+
      '<div class="hfb-locked-note">🔒 基本資料一般職類無法修改'+
        (isInitiator(state.identity) ? '<button class="hfb-edit-btn" id="hfb-edit-case">編輯基本資料</button>' : '・如需更正請聯繫個管師或醫師') +
      '</div>'+
    '</div>';

    body += followUpSection(c);

    body += '<div class="hfb-clinical-cols"><div class="hfb-clinical-col">'+medsSection(c)+'</div><div class="hfb-clinical-col">'+labsSection(c)+'</div></div>';

    body += '<div class="hfb-section-title"><span>各職類任務狀態</span>'+
      (c.discharged ? '<span class="hfb-locked-tag">🔒 已出院,無法再指派任務</span>' :
        (isInitiator(state.identity) ? '<button class="hfb-assign-btn" data-toggle-assign="'+c.id+'">'+(state.showAssign[c.id]?'收合':'+ 指派任務')+'</button>' : '')) +
    '</div>';

        html += taskCard(t);

  function taskCard(t){
    var role = ROLES[t.role];
    var st = STATUS[t.status];
    var pillClass = 'hfb-status-pill'+(t.status==='pending' ? ' is-pending' : '');
    var pillLabel = t.status==='done' ? '✓ '+st.label : st.label;
    var canEditTaskDate = canManageTask(t);
    var taskDateHtml = canEditTaskDate
      ? '<div class="hfb-task-date-editor"><label for="task-date-'+t.id+'">指派日期</label><input type="datetime-local" id="task-date-'+t.id+'" data-task-date="'+t.id+'" value="'+esc(t.scheduledAt||nowLocalStr())+'"><button type="button" class="hfb-task-date-save" data-save-task-date="'+t.id+'">儲存日期</button><span class="hfb-task-date-saved" id="task-date-saved-'+t.id+'"></span></div>'
      : '<div class="hfb-task-meta">指派日期 '+fmt(t.scheduledAt||t.createdAt)+'</div>';
    var html = '<div class="hfb-task-card" style="--role-color:'+role.color+'">'+
      '<div class="hfb-task-top">'+
        '<div><span class="hfb-role-badge" style="background:'+role.tint+'; color:'+role.color+'">'+role.label+'</span>'+
        '<div class="hfb-task-title">'+esc(t.title)+'</div>'+
        taskDateHtml+'</div>'+
        '<div class="hfb-task-top-actions"><span class="'+pillClass+'" style="background:'+st.bg+'; color:'+st.ink+'">'+pillLabel+'</span>'+
        (canEditTaskDate ? '<button type="button" class="hfb-task-delete" data-delete-task="'+t.id+'">🗑️ 刪除</button>' : '')+
        '</div></div>';

    if(t.status==='done'){
      html += '<div class="hfb-task-response">'+esc(t.response)+
        '<div class="who">回覆人:'+(t.respondedByName?esc(t.respondedByName)+'・':'')+role.label+' ・ '+fmt(t.respondedAt)+'</div></div>';
    } else if(state.identity===t.role){
      html += responseFormHtml(t);
    } else if(t.status==='in_progress'){
      html += '<div class="hfb-task-response" style="color:var(--ink-mute);">'+role.label+'處理中,尚未送出回覆。</div>';
    }
    html += '</div>';
    return html;
  }

  function myTasksView(){
    var myTasks = state.tasks.filter(function(t){ return t.role===state.identity && isTaskActive(t); })
      .sort(function(a,b){
        var order = {pending:0, in_progress:1, done:2};
        return order[a.status]-order[b.status] || a.createdAt-b.createdAt;
      });
    if(myTasks.length===0){
      return '<div class="hfb-placeholder">目前沒有指派給您的任務</div>';
    }
    var html = '<div class="hfb-section-title"><span>我的任務('+myTasks.length+')</span></div>';
    myTasks.forEach(function(t){
      var c = state.cases.find(function(x){ return x.id===t.caseId; });
      var st = STATUS[t.status];
      var pillClass = 'hfb-status-pill'+(t.status==='pending' ? ' is-pending' : '');
      var pillLabel = t.status==='done' ? '✓ '+st.label : st.label;
      html += '<div class="hfb-mytasks-item">'+
        '<div class="patient">'+(c?esc(c.name)+' ・ '+esc(c.mrn||''):'')+'</div>'+
        '<div class="hfb-task-top">'+
          '<div class="hfb-task-title" style="margin-top:0;">'+esc(t.title)+'</div>'+
          '<span class="'+pillClass+'" style="background:'+st.bg+'; color:'+st.ink+'">'+pillLabel+'</span>'+
        '</div>';
      if(t.status==='done'){
        html += '<div class="hfb-task-response">'+esc(t.response)+'<div class="who">'+(t.respondedByName?esc(t.respondedByName)+' ・ ':'')+fmt(t.respondedAt)+'</div></div>';
      } else if(c && c.discharged){
        html += '<div class="hfb-discharged-note">'+
          '<span>⚠️ 病人已出院,此任務無法再回覆</span>'+
          '<button type="button" class="hfb-dismiss-btn" data-dismiss-task="'+t.id+'">確認</button>'+
        '</div>';
      } else {
        html += responseFormHtml(t);
      }
      html += '</div>';
    });
    return html;
  }

  function esc(s){
    s = s==null ? '' : String(s);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function bindEvents(){
    var root = document.getElementById('hfb-app');

    var idSel = document.getElementById('hfb-identity-select');
    if(idSel) idSel.onchange = function(){
      state.currentMemberId = this.value;
      var m = currentMember();
      state.identity = m ? m.role : 'case_manager';
      state.view = 'cases';
      render();
    };

    var toggleMembers = document.getElementById('hfb-toggle-members');
    if(toggleMembers) toggleMembers.onclick = function(){
      state.showMemberManager = !state.showMemberManager;
      render();
    };

    var exportCsvBtn = document.getElementById('hfb-export-csv');
    if(exportCsvBtn) exportCsvBtn.onclick = function(){
      function csvCell(v){
        v = v==null ? '' : String(v);
        if(/[",\n]/.test(v)) v = '"'+v.replace(/"/g,'""')+'"';
        return v;
      }
      function medsSummary(m){
        if(!m || !m.on) return '';
        return (m.drug||'')+(m.dose?' '+m.dose+'顆':'')+(m.freq?' '+m.freq:'');
      }
      var headers = ['姓名','病歷號','身分證字號','性別','生日','年齡','床號','住院日期','收案日期','心衰竭分類','收案人',
        'NYHA','LVEF(%)','ACEI/ARB/ARNI','β-Blocker','MRA','SGLT2i','其他用藥',
        '出院狀態','出院日期','下次門診','追蹤醫師','追蹤時段','追蹤備註','收案備註'];
      var rows = [headers.map(csvCell).join(',')];
      state.cases.forEach(function(c){
        var meds = c.meds || {};
        var fu = c.followUp || {};
        var age = calcAge(c.birthday);
        var gender = genderFromId(c.idnumber);
        var initiatorLabel = (c.initiatorName?c.initiatorName+' ':'')+(ROLES[c.initiator]?ROLES[c.initiator].label:'');
        var row = [
          c.name, c.mrn, c.idnumber, gender, c.birthday, (age!==null?age:''), c.ward, c.admissionDate, c.caseDate, c.hfType, initiatorLabel,
          c.nyha, c.lvef,
          medsSummary(meds.acei), medsSummary(meds.bb), medsSummary(meds.mra), medsSummary(meds.sglt2), medsSummary(meds.other),
          (c.discharged?'已出院':'未出院'), (c.dischargeDate||''), (fu.nextVisitDate||''), (fu.doctor||''), (fu.session||''), (fu.note||''), (c.note||'')
        ];
        rows.push(row.map(csvCell).join(','));
      });
      var csvStr = '\ufeff' + rows.join('\r\n');
      var blob = new Blob([csvStr], {type: 'text/csv;charset=utf-8;'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var d = new Date();
      var p = function(n){ return String(n).padStart(2,'0'); };
      a.href = url;
      a.download = 'hf-team-bridge-cases-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+'.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    var mmAdd = document.getElementById('mm-add');
    if(mmAdd) mmAdd.onclick = function(){
      var nameInput = document.getElementById('mm-name');
      var roleSelect = document.getElementById('mm-role');
      var name = nameInput.value.trim();
      if(!name){ nameInput.focus(); return; }
      var newMember = {id: uid(), name: name, role: roleSelect.value};
      state.members.push(newMember);
      state.newMemberDraft = {name:'', role:'case_manager'};
      saveMembers();
      render();
    };
    var mmName = document.getElementById('mm-name');
    if(mmName) mmName.oninput = function(){ state.newMemberDraft.name = this.value; };
    var mmRole = document.getElementById('mm-role');
    if(mmRole) mmRole.onchange = function(){ state.newMemberDraft.role = this.value; };

    root.querySelectorAll('[data-remove-member]').forEach(function(b){
      b.onclick = function(){
        var id = this.getAttribute('data-remove-member');
        if(state.members.length<=1) return;
        state.members = state.members.filter(function(m){ return m.id!==id; });
        if(state.currentMemberId===id){

      inp.onclick = function(e){ e.stopPropagation(); };

      inp.onchange = function(e){
        e.stopPropagation();
        var cid = this.getAttribute('data-case-number');

    root.querySelectorAll('[data-open-tracking]').forEach(function(b){

        if(c) openTrackingWindow(c);

    root.querySelectorAll('[data-discharge]').forEach(function(b){

        var c = state.cases.find(function(x){ return x.id===cid; });

        c.discharged = !c.discharged;

          c.dischargeDate = c.dischargeDate || todayStr();
          if(c.followUp) c.followUp.trackingDone = false;
          state.tasks.forEach(function(t){
            if(t.caseId===c.id && t.status!=='done' && !t.cancelled){
              t.cancelled = true;
              t.cancelledAt = nowLocalStr();

  var WEEKDAYS = ['週日','週一','週二','週三','週四','週五','週六'];

<script>
(function(){
  var SUPABASE_URL = 'https://yitgfsuynikljguwlgrd.supabase.co';
  var SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_lWPdN9637K0mKLqU2Nq-MA_vj-KzPFJ';
  var authShell = document.getElementById('hfb-auth-shell');
  var appRoot = document.getElementById('hfb-root');
  var form = document.getElementById('hfb-login-form');
  var emailInput = document.getElementById('hfb-login-email');
  var passwordInput = document.getElementById('hfb-login-password');
  var submitButton = document.getElementById('hfb-login-submit');
  var message = document.getElementById('hfb-login-message');

  function normalizeAccountInput(){
    var value = emailInput.value.trim();
    var normalized = value.replace(/@chimei\.org\.tw$/i, '');
    if(value !== normalized) emailInput.value = normalized;
  }
  emailInput.addEventListener('input', normalizeAccountInput);
  emailInput.addEventListener('change', normalizeAccountInput);
  emailInput.addEventListener('blur', normalizeAccountInput);
  setTimeout(normalizeAccountInput, 250);

  if(!window.supabase){
    message.textContent = '登入元件載入失敗，請重新整理頁面。';
    return;
  }

  var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: true,
      detectSessionInUrl: false
    }
  });
  window.hfbSupabaseClient = client;

  var INACTIVITY_LIMIT = 10 * 60 * 1000;
  var lastActivityAt = Date.now();
  var sessionActive = false;
  var signingOut = false;

  function clearLoginFields(){
    emailInput.value = '';
    passwordInput.value = '';
  }

  async function secureLogout(showIdleMessage){
    if(signingOut) return;
    signingOut = true;
    sessionActive = false;
    appRoot.style.display = 'none';
    clearLoginFields();
    if(showIdleMessage) window.alert('系統已閒置 10 分鐘，為保護資料安全已自動登出。');
    try{ await client.auth.signOut({scope:'local'}); }catch(error){ console.error(error); }
    window.location.replace(window.location.pathname + window.location.search);
  }

  window.hfbLogout = function(){
    secureLogout(false);
  };

  function registerActivity(){
    if(sessionActive) lastActivityAt = Date.now();
  }

  function checkInactivity(){
    if(sessionActive && Date.now() - lastActivityAt >= INACTIVITY_LIMIT){
      secureLogout(true);
    }
  }

  ['pointerdown','keydown','touchstart','scroll'].forEach(function(eventName){
    window.addEventListener(eventName, registerActivity, {passive:true});
  });
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden) checkInactivity();
  });
  window.addEventListener('pagehide', function(){
    appRoot.style.display = 'none';
  });
  window.addEventListener('pageshow', function(event){
    if(event.persisted) window.location.reload();
  });
  setInterval(checkInactivity, 15000);

  function friendlyError(error){
    var text = (error && error.message) || '';
    if(/invalid login credentials/i.test(text)) return '電子郵件或密碼不正確。';
    if(/email not confirmed/i.test(text)) return '此帳號尚未完成電子郵件確認。';
    if(/rate limit/i.test(text)) return '嘗試次數過多，請稍後再試。';
    return '登入失敗，請確認帳號密碼後再試。';
  }

  async function openApp(user){
    var result = await client
      .from('profiles')
      .select('display_name, professional_role, system_role, is_active')
      .eq('id', user.id)
      .single();

    if(result.error || !result.data){
      await client.auth.signOut();
      message.textContent = '此帳號尚未建立系統成員資料，請聯絡管理員。';
      return;
    }
    if(!result.data.is_active){
      await client.auth.signOut();
      message.textContent = '此帳號目前已停用，請聯絡管理員。';
      return;
    }

    window.dispatchEvent(new CustomEvent('hfb-auth-ready', {
      detail: { userId: user.id, profile: result.data }
    }));
    lastActivityAt = Date.now();
    sessionActive = true;
    clearLoginFields();
    authShell.style.display = 'none';
    appRoot.style.display = 'flex';
  }

  form.addEventListener('submit', async function(event){
    event.preventDefault();
    message.textContent = '';
    submitButton.disabled = true;
    submitButton.textContent = '登入中…';

    var account = emailInput.value.trim().toLowerCase().replace(/@chimei\.org\.tw$/i, '');
    if(!account || account.indexOf('@') !== -1){
      submitButton.disabled = false;
      submitButton.textContent = '登入系統';
      message.textContent = '請只輸入 @chimei.org.tw 前面的院內帳號。';
      emailInput.focus();
      return;
    }

    var result = await client.auth.signInWithPassword({
      email: account + '@chimei.org.tw',
      password: passwordInput.value
    });

    submitButton.disabled = false;
    submitButton.textContent = '登入系統';

    if(result.error){
      message.textContent = friendlyError(result.error);
      passwordInput.select();
      return;
    }
    await openApp(result.data.user);
  });

  clearLoginFields();
  client.auth.getSession().then(function(result){
    var session = result.data && result.data.session;
    if(session && session.user){
      openApp(session.user);
    } else {
      authShell.style.display = 'flex';
      clearLoginFields();
      emailInput.focus();
    }
  });
})();
</script>
